version: '3.8'

services:
  fastapi_backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: leadflow_fastapi
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://user:password_seguro_db@postgres:5432/leadflow
    networks:
      - automation_network

  frontend_dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - fastapi_backend
    networks:
      - automation_network

networks:
  automation_network:
    name: automations_automation-network
    external: true
